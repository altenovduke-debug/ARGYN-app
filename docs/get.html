<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Redirecting to Argyns...</title>
    <script>
        function redirect() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            var appStoreUrl = "https://apps.apple.com/us/app/argyns/id6759314097";
            var playStoreUrl = "https://play.google.com/store/apps/details?id=com.argyn.app";
            var homeUrl = "index.html";

            // iOS detection
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.replace(appStoreUrl);
                return;
            }

            // Android detection
            if (/android/i.test(userAgent)) {
                // TODO: Поменять на playStoreUrl когда приложение будет опубликовано
                window.location.replace(homeUrl);
                return;
            }

            // Fallback for everything else
            window.location.replace(homeUrl);
        }
    </script>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f7;
            text-align: center;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0071e3;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body onload="redirect()">
    <div>
        <div class="loader"></div>
        <p>Перенаправляем в магазин приложений...<br>
            <small>Загружаем Argyns</small>
        </p>
    </div>
</body>

</html>
